# Goal: Step Multiple Environment variable at Workflow, job, step level and Use GitHub Context Variable
#
name: Environment Variable

on:
  workflow_dispatch:

env:
  Level_1: Jogindar

jobs:
  print-environment:
    runs-on: ubuntu-latest

    env:
      Level_2: Balwindar

    steps:
      - name: Envirnoment Variable
        env:
          Level_3: Sukwindar

        run: |
          echo "Workflow Variable : $Level_1"
          echo "Job Variable : $Level_2"
          echo "Step Variable : $Level_3"

      - name: Print Context variable

        run: |
          echo "Commit SHA : ${{ github.sha }}"
          echo "Actor : ${{ github.actor }}"
          echo "Repository : ${{ github.repository }}"
          echo "Branch : ${{ github.ref_name }}"


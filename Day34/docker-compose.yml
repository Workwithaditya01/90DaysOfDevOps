version: "3.9"

services:
  web:
    build: ./app
    container_name: flask-app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: password
      REDIS_HOST: redis
    networks:
      - app-network
    labels:
      app: flask
      environment: development

  db:
    image: postgres:17
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    labels:
      app: postgres

  redis:
    image: redis:7
    container_name: redis-cache
    networks:
      - app-network
    labels:
      app: redis

volumes:
  postgres-data:

networks:
  app-network:
